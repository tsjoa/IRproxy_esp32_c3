substitutions:
  name: irblaster
  friendly_name: irblaster
  ap_ssid: "OpenIRBlaster Setup"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  project:
    name: "jaycollett.openirblaster"
    version: "0.6.0"

esp32:
  variant: esp32c3
  flash_size: 4MB
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: "ecrsvtevgscrkgsnthgnercbdn"

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: ${ap_ssid}
    ap_timeout: 0s

captive_portal:

# Define your physical hardware first
remote_transmitter:
  id: ir_tx_hardware
  pin: GPIO0
  carrier_duty_percent: 50%

remote_receiver:
  id: ir_rx_hardware
  pin:
    number: GPIO10
    mode: INPUT_PULLUP
    inverted: true
  dump: all
  idle: 30ms

# Define the Proxy that HAIR uses for auto-discovery
infrared:
  - platform: ir_rf_proxy
    name: "IR Blaster Transmitter"
    id: ir_proxy_tx
    remote_transmitter_id: ir_tx_hardware

  - platform: ir_rf_proxy
    name: "IR Blaster Receiver"
    id: ir_proxy_rx
    remote_receiver_id: ir_rx_hardware
    
    

# Basic device management
sensor:
  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi Signal"
    update_interval: 30s

switch:
  - platform: restart
    name: "Restart"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
